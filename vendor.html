<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><title>Vendor Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #f1f7ff; font-family: 'Poppins', sans-serif; }
    .nav-bar { width: 100%; background: #2887ff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; color:white;}
    .nav-links a { color:white; margin-left:15px; text-decoration:none; font-weight:600; cursor: pointer; }
    .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1100px; margin: 30px auto; padding: 0 20px; }
    .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); text-align: center; }
    .order-item { background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; justify-content: space-between; align-items: center; }
    .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:#000000aa; justify-content:center; align-items:center; z-index:1000; }
    .modal-content { background:white; padding:30px; border-radius:12px; width:350px; text-align:left;}
    .modal-content input, .modal-content textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 5px;}
    .btn { background: #2887ff; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="nav-bar">
      <span style="font-size: 1.5rem; font-family: 'Pacifico';">FoodMitra</span>
      <div class="nav-links">
        <a href="index.html">Menu</a>
        <a onclick="showSection('market')">Market</a>
        <a onclick="showSection('orders')">Orders</a>
        <a onclick="document.getElementById('profileModal').style.display='flex'">Profile</a>
        <a onclick="logoutUser()" style="background:white; color:#2887ff; padding:5px 15px; border-radius:20px;">Logout</a>
    </div>
  </div>

  <div id="marketSection">
      <h1 id="welcomeText" style="color: #2887ff; text-align:center; margin-top:20px;">Hello, Vendor!</h1>
      <div id="marketGrid" class="grid-container"></div>
  </div>

  <div id="ordersSection" style="display:none; max-width:800px; margin:40px auto; padding:0 20px;">
      <h2>Your Orders</h2><div id="orderList"></div>
  </div>

  <div id="profileModal" class="modal">
    <div class="modal-content">
        <h3>Edit Profile</h3>
        <form onsubmit="updateProfile(event)">
            <label>Name</label><input type="text" id="profName" required>
            <label>Business</label><input type="text" id="profBName" required>
            <label>Phone</label><input type="tel" id="profPhone" required>
            <label>Address</label><textarea id="profAddr" required></textarea>
            <button type="submit" class="btn" style="width:100%;">Update</button>
            <button type="button" class="btn" style="background:#888; width:100%; margin-top:5px;" onclick="document.getElementById('profileModal').style.display='none'">Cancel</button>
        </form>
    </div>
  </div>

  <div id="orderModal" class="modal">
      <div class="modal-content">
          <h3>Place Order</h3>
          <p id="modalProductName" style="font-weight:bold;"></p>
          <form onsubmit="submitOrder(event)">
              <input type="hidden" id="modalProductId"><input type="hidden" id="modalSupplierId"><input type="hidden" id="modalSupplierName">
              <label>Qty (kg):</label><input type="number" id="orderQty" required>
              <label>Address:</label><textarea id="orderAddress" required></textarea>
              <label>Offer Price (₹):</label><input type="number" id="orderOffer" step="0.01" required>
              <button type="submit" class="btn" style="width:100%;">Confirm</button>
              <button type="button" class="btn" style="background:#888; width:100%; margin-top:5px;" onclick="document.getElementById('orderModal').style.display='none'">Cancel</button>
          </form>
      </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, collection, addDoc, onSnapshot, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDJjDPtbbgw0fvQgB2Zl2SlbX56jY8pd1I",
      authDomain: "foodmitra-2006.firebaseapp.com",
      projectId: "foodmitra-2006",
      storageBucket: "foodmitra-2006.firebasestorage.app",
      messagingSenderId: "983778537017",
      appId: "1:983778537017:web:20634d91ea94065b9267e8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    let currentUser = null;
    let vendorData = {};

    window.logoutUser = () => signOut(auth);
    window.showSection = (s) => { 
        document.getElementById('marketSection').style.display = s==='market'?'block':'none'; 
        document.getElementById('ordersSection').style.display = s==='orders'?'block':'none'; 
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "index.html"; }
        else {
            currentUser = user;
            const docSnap = await getDoc(doc(db, "users", user.uid));
            if(docSnap.exists()) {
                vendorData = docSnap.data();
                document.getElementById("welcomeText").innerText = "Hello, " + vendorData.business_name;
                document.getElementById("orderAddress").value = vendorData.address;
                document.getElementById("profName").value = vendorData.name;
                document.getElementById("profBName").value = vendorData.business_name;
                document.getElementById("profPhone").value = vendorData.phone;
                document.getElementById("profAddr").value = vendorData.address;
            }
            loadMarket();
            loadMyOrders();
        }
    });

    window.updateProfile = async (e) => {
        e.preventDefault();
        await updateDoc(doc(db, "users", currentUser.uid), {
            name: document.getElementById('profName').value,
            business_name: document.getElementById('profBName').value,
            phone: document.getElementById('profPhone').value,
            address: document.getElementById('profAddr').value
        });
        alert("Updated!"); location.reload();
    }

    function loadMarket() {
        onSnapshot(collection(db, "products"), (snapshot) => {
            const grid = document.getElementById("marketGrid"); grid.innerHTML = "";
            snapshot.forEach(d => {
                const p = d.data();
                grid.innerHTML += `<div class="card"><h3>${p.name}</h3><h2 style="color:#2887ff;">₹${p.price}/kg</h2><p>${p.supplier_name}</p><button class="btn" onclick="openOrderModal('${d.id}', '${p.supplier_id}', '${p.supplier_name}', '${p.name}', ${p.price})" style="width:100%;">Order</button></div>`;
            });
        });
    }

    window.openOrderModal = (pid, sid, sname, name, price) => { 
        document.getElementById('orderModal').style.display = 'flex'; 
        document.getElementById('modalProductId').value = pid; 
        document.getElementById('modalSupplierId').value = sid; 
        document.getElementById('modalSupplierName').value = sname; 
        document.getElementById('modalProductName').innerText = name + " (₹" + price + ")"; 
        document.getElementById('orderOffer').value = price; 
    }
    
    window.submitOrder = async (e) => {
        e.preventDefault();
        await addDoc(collection(db, "orders"), {
            product_id: document.getElementById('modalProductId').value,
            product_name: document.getElementById('modalProductName').innerText.split(" (")[0],
            supplier_id: document.getElementById('modalSupplierId').value,
            supplier_name: document.getElementById('modalSupplierName').value,
            vendor_id: currentUser.uid,
            vendor_name: vendorData.business_name,
            vendor_phone: vendorData.phone,
            quantity: document.getElementById('orderQty').value,
            address: document.getElementById('orderAddress').value,
            offer_price: document.getElementById('orderOffer').value,
            status: 'pending',
            date: serverTimestamp()
        });
        alert("Order Placed!"); document.getElementById('orderModal').style.display = 'none';
    }

    function loadMyOrders() {
        const q = query(collection(db, "orders"), where("vendor_id", "==", currentUser.uid));
        onSnapshot(q, (snapshot) => {
            const list = document.getElementById("orderList"); list.innerHTML = "";
            snapshot.forEach(d => {
                const o = d.data();
                let btn = ''; let statusColor = 'orange'; let statusText = o.status.toUpperCase();
                if (o.status === 'pending') {
                    btn = `<button onclick="cancelOrder('${d.id}')" style="background:red; color:white; border:none; padding:5px;">Cancel</button>`;
                } else if (o.status === 'accepted') { statusText = 'PREPARING'; statusColor = 'blue'; }
                else if (o.status === 'out_for_delivery') { statusText = 'OUT FOR DELIVERY'; statusColor = '#ff9800'; btn = `<small>Driver: ${o.delivery_partner_name} (${o.delivery_partner_phone})</small>`; }
                else if (o.status === 'delivered') { statusColor = 'green'; } 
                else { statusColor = 'red'; }

                list.innerHTML += `<div class="order-item"><div><h4>${o.product_name}</h4><p>${o.supplier_name}</p><small>${o.quantity}kg @ ₹${o.offer_price}</small></div><div style="text-align:right;"><span style="font-weight:bold; color:${statusColor}">${statusText}</span><br>${btn}</div></div>`;
            });
        });
    }

    window.cancelOrder = async (id) => { 
        if(confirm("Cancel?")) { await updateDoc(doc(db, "orders", id), { status: 'cancelled' }); }
    }
  </script>
</body>
</html>
